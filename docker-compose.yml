services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: cosmos-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cosmos-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cosmos
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      DYNAMIC_CONFIG_ENABLED: "true"

  postgres:
    image: postgres:16
    container_name: cosmos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cosmos
      POSTGRES_USER: cosmos
      POSTGRES_PASSWORD: cosmos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosmos"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    # ES Java 클라이언트(9.4.2, Spring Boot 4.1이 끌어옴)와 메이저 버전을 맞춘다.
    # (8.x 서버를 쓰면 9.x 클라이언트가 indices.exists 응답을 400으로 처리)
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    container_name: cosmos-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ES 관리/조회 UI. ES 와 같은 메이저(9.4.2)로 맞춘다.
  # ES 가 xpack.security.enabled=false 라 별도 인증 없이 접속(개발용).
  # 컨테이너 네트워크 안에서 elasticsearch:9200 으로 접근. 브라우저: http://localhost:5601
  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.2
    container_name: cosmos-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cosmos-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 단일 진입점(리버스 프록시). 개발 중 Java/Python 서비스는 호스트에서 실행되며
  # Nginx 는 host.docker.internal 로 호스트의 8081/8082/8000 에 접근한다.
  nginx:
    image: nginx:1.27-alpine
    container_name: cosmos-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Python AI 서비스(FastAPI). 소스는 ./services/ai-service/Dockerfile 로 빌드된다.
  # Kafka 는 컨테이너 네트워크 내부 리스너(kafka:19092)로 접근하고,
  # core-service 는 아직 호스트(8082)에서 돌므로 host.docker.internal 로 접근한다.
  ai-service:
    build: ./services/ai-service
    container_name: cosmos-ai-service
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      PROCESSED_TOPIC: processed.exoplanet
      PREDICTION_TOPIC: prediction.exoplanet
      CORE_SERVICE_URL: http://host.docker.internal:8082
    # 학습된 모델(.joblib)을 볼륨에 두어 컨테이너 재시작·재빌드에도 유지.
    volumes:
      - ai-models:/app/models
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  pgdata:
  ai-models:
