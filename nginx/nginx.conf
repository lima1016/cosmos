events {}

http {
    # 개발 중에는 Java/Python 서비스가 호스트(윈도우)에서 직접 실행되므로
    # 컨테이너의 Nginx는 host.docker.internal 로 호스트에 접근한다.
    upstream core_service      { server host.docker.internal:8082; }
    upstream ingestion_service { server host.docker.internal:8081; }
    upstream ai_service        { server host.docker.internal:8000; }

    server {
        listen 8080;

        # 조회/통계/검색
        location /api/exoplanets {
            proxy_pass http://core_service;
            proxy_set_header Host $host;
        }

        # APOD(천문 사진). /api/apod/translate 는 최초 번역 시 모델 로드로 오래 걸릴 수 있어
        # 기본 60초 read timeout 을 넉넉히 늘린다.
        location /api/apod {
            proxy_pass http://core_service;
            proxy_set_header Host $host;
            proxy_read_timeout 600s;
        }

        # NeoWs(근지구 천체)
        location /api/neo {
            proxy_pass http://core_service;
            proxy_set_header Host $host;
        }

        # 수집 트리거
        location /api/ingest {
            proxy_pass http://ingestion_service;
            proxy_set_header Host $host;
        }

        # AI 학습/예측 (/api/ai/train → ai-service의 /train)
        location /api/ai/ {
            rewrite ^/api/ai/(.*)$ /$1 break;
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
        }
    }
}
